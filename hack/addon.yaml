---
kind: Addon
apiVersion: tackle.konveyor.io/v1alpha1
metadata:
  namespace: konveyor-tackle
  name: analyzer
spec:
  capability: analysis
  container:
    name: addon
    imagePullPolicy: Always
    image: quay.io/jortel/sleeper
    command: 
    - /usr/bin/sleep
    - "10"

---
kind: Extension
apiVersion: tackle.konveyor.io/v1alpha1
metadata:
  namespace: konveyor-tackle
  name: provider-java
spec:
  addon: analyzer
  capability: provider-Java
  container:
    name: provider-java
    imagePullPolicy: Always
    image: quay.io/jortel/sleeper
    command: 
    - /usr/bin/sleep
    - "90"
    env:
    - name: PORT
      value: "8080"
  metadata:
    provider:
      initConfig:
        port: "8080"

---
kind: TaskProfile
apiVersion: tackle.konveyor.io/v1alpha1
metadata:
  namespace: konveyor-tackle
  name: analyzer
spec:
  addon:
  - name: analyzer
  extension:
  - match: tag:Language=
    capability:  provider-$*


