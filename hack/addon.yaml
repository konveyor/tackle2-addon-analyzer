---
kind: Addon
apiVersion: tackle.konveyor.io/v1alpha1
metadata:
  namespace: konveyor-tackle
  name: analyzer
spec:
  task: analyzer
  capability: analyzer
  container:
    name: addon
    imagePullPolicy: Always
    image: quay.io/jortel/tackle2-addon-analyzer:provider
  extension:
  - match: tag:Language=
    capability:  provider-$*

---
kind: Extension
apiVersion: tackle.konveyor.io/v1alpha1
metadata:
  namespace: konveyor-tackle
  name: provider-java
spec:
  addon: analyzer
  capability: provider-Java
  container:
    name: provider-java
    imagePullPolicy: Always
    image: quay.io/jortel/sleeper
    command: 
    - /usr/bin/sleep
    - "10"
    env:
    - name: PORT
      value: "8080"
  metadata:
    name: java
    binaryPath: /jdtls/bin/jdtls
    initConfig:
    - analysisMode: source-only
      providerSpecificConfig:
        bundles: /jdtls/java-analyzer-bundle/java-analyzer-bundle.core/target/java-analyzer-bundle.core-1.0.0-SNAPSHOT.jar
        depOpenSourceLabelsFile: /usr/local/etc/maven.default.index
        lspServerPath: /jdtls/bin/jdtls
        port: "8080"

---
kind: Task
apiVersion: tackle.konveyor.io/v1alpha1
metadata:
  namespace: konveyor-tackle
  name: analyzer
spec:
  addon:
  - name: analyzer

